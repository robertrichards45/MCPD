{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head d-flex justify-content-between align-items-center">
      <h2 class="mb-0">Reports</h2>
      <a class="btn btn-primary" href="{{ url_for('reports.new_report') }}">New Report</a>
    </div>
    <div class="results-list">
      {% for r in reports %}
      <article class="result-card">
        <div class="result-head">
          <h4>#{{ r.id }} {{ r.title }}</h4>
          <span class="badge bg-dark">{{ r.status }}</span>
        </div>
        <p class="result-sub">Updated: {{ r.updated_at.strftime('%Y-%m-%d %H:%M') }}</p>
        <div class="result-actions">
          <a class="btn btn-sm btn-primary" href="{{ url_for('reports.report_detail', report_id=r.id) }}">Open Report</a>
        </div>
      </article>
      {% else %}
      <div class="card p-3 text-muted">No reports yet.</div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
