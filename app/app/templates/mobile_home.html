{% extends 'base.html' %}
{% block body %}
<style>
  .mobile-home-screen {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: max(16px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom)) 16px;
    background: linear-gradient(180deg, #efe6d8 0%, #e6dccd 100%) !important;
    color: #172017 !important;
  }
  .mobile-home-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .mobile-home-header h1,
  .mobile-home-prompt {
    color: #172017 !important;
  }
  .mobile-home-menu {
    min-height: 36px;
    padding: 0 12px;
    border: 1px solid #d0c2aa;
    border-radius: 12px;
    background: rgba(255,255,255,0.85) !important;
    color: #243022 !important;
  }
  .mobile-home-main {
    flex: 1;
    display: grid;
    align-content: center;
    gap: 18px;
  }
  .mobile-home-prompt {
    margin: 0;
    font-size: 28px;
    line-height: 1.05;
  }
  .mobile-home-actions {
    display: grid;
    gap: 12px;
  }
  .mobile-home-action {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 64px;
    padding: 0 18px;
    border-radius: 16px;
    border: 1px solid #d5c7b0;
    background: rgba(255,255,255,0.96) !important;
    color: #1d241c !important;
    text-decoration: none;
    font-size: 17px;
    font-weight: 700;
    text-align: center;
  }
  .mobile-home-action.is-primary {
    min-height: 76px;
    background: linear-gradient(180deg, #253021 0%, #1b2418 100%) !important;
    color: #f8f4ed !important;
    border-color: rgba(27, 36, 24, 0.85);
  }
</style>
<div class="mobile-home-screen">
  <header class="mobile-home-header">
    <h1>MCPD Portal</h1>
    <button class="mobile-home-menu" type="button" aria-label="Menu">Menu</button>
  </header>

  <main class="mobile-home-main" aria-label="Field home">
    <h2 class="mobile-home-prompt">Ready to start a call?</h2>
    <div class="mobile-home-actions">
      {% for card in action_cards %}
        {% if card.is_live %}
        <a class="mobile-home-action {% if loop.first %}is-primary{% endif %}" href="{{ card.href }}">{{ card.title }}</a>
        {% else %}
        <span class="mobile-home-action is-disabled {% if loop.first %}is-primary{% endif %}">{{ card.title }}</span>
        {% endif %}
      {% endfor %}
    </div>
  </main>
</div>
{% endblock %}
