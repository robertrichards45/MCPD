{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head">
      <h2 class="mb-1">Upload Training Roster</h2>
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post" enctype="multipart/form-data" class="search-panel">
        <div class="row g-3">
          <div>
            <label class="form-label text-dark">Title</label>
            <input class="form-control" name="title" />
          </div>
          <div>
            <label class="form-label text-dark">Description</label>
            <input class="form-control" name="description" />
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label text-dark">Roster PDF</label>
          <input type="file" class="form-control" name="file" required />
        </div>
        <div class="mt-3 d-flex gap-2">
          <button class="btn btn-primary" type="submit">Upload</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('training.training_list') }}">Back to Rosters</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
