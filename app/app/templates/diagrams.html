{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}

  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head d-flex justify-content-between align-items-center">
      <div>
        <h2 class="mb-0">Diagramming</h2>
        <div class="small text-muted">Use the embedded editor, then export when ready.</div>
      </div>
      <a class="btn btn-secondary" href="https://excalidraw.com" target="_blank" rel="noopener">Open Fullscreen</a>
    </div>

    <div class="card p-2">
      <div class="embed-wrap">
      <iframe
        src="https://excalidraw.com"
        title="Diagram Editor"
        referrerpolicy="no-referrer"
        allow="clipboard-read; clipboard-write"
      ></iframe>
      </div>
    </div>
  </div>
</div>
{% endblock %}
