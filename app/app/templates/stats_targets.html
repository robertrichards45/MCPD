{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head d-flex justify-content-between align-items-center">
      <h2 class="mb-0">Stat Targets (Admin)</h2>
      <a class="btn btn-outline-secondary" href="{{ url_for('admin.stats_targets_upload') }}">Upload Targets</a>
    </div>
    <form method="post" class="card p-3">
      <div class="table-responsive mb-3">
        <table class="table table-striped">
          <thead><tr><th>Category</th><th>Target</th></tr></thead>
          <tbody>
          {% for c in categories %}
            <tr>
              <td>{{ c.name }}</td>
              <td><input class="form-control" name="target_{{ c.id }}" value="{{ c.target_value }}" /></td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
      <button class="btn btn-primary">Save Targets</button>
    </form>
  </div>
</div>
{% endblock %}
