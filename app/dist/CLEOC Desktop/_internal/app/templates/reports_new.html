{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head">
      <h2 class="mb-1">New Report</h2>
      <p class="text-muted mb-0">Create a report shell, then add attachments and persons.</p>
    </div>
    <div class="card p-3">
      <form method="post">
        <div class="mb-3">
          <label class="form-label text-dark">Report Title</label>
          <input class="form-control" name="title" placeholder="Incident title" />
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary">Create Report</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('reports.list_reports') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
