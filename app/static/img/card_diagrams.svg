  <g fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="140" y="150" width="260" height="120" rx="18"/>
    <rect x="780" y="140" width="280" height="140" rx="18"/>
    <rect x="470" y="340" width="280" height="130" rx="18"/>
    <path d="M 400 210 L 780 210"/>
    <path d="M 920 280 L 610 340"/>
    <path d="M 270 270 L 520 340"/>
    <path d="M 770 405 L 1060 405"/>
    <path d="M 1020 405 L 990 380"/>
    <path d="M 1020 405 L 990 430"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#ffffff">
    <text x="140" y="110" font-size="56" font-weight="700" letter-spacing="1">Diagramming</text>
    <text x="140" y="540" font-size="26" opacity="0.9">Flowcharts, sketches, plans. Free inside the portal.</text>
  </g>
</svg>

