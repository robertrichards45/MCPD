{% extends 'base.html' %}
{% set body_class = 'landing' %}
{% block body %}
<div class="login-bg">
  <div class="login-panel">
    <img src="{{ url_for('usmc_emblem') }}" alt="USMC Emblem" class="login-emblem" />
    <h1>Login with Name</h1>
    <p class="subtitle">Use your name and password</p>
    {% if error %}
      <div class="alert alert-danger py-1">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('auth.login_by_name') }}">
      {% if next_url %}
        <input type="hidden" name="next" value="{{ next_url }}" />
      {% endif %}
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button class="btn btn-primary w-100">Login</button>
    </form>
    <a class="btn btn-secondary w-100 mt-2" href="{{ url_for('auth.landing') }}">Back to Login</a>
  </div>
</div>
{% endblock %}
