{% extends 'base.html' %}
{% set body_class = 'landing' %}
{% block body %}
<div class="login-bg">
  <div class="login-panel">
    <img src="{{ url_for('usmc_emblem') }}" alt="USMC Emblem" class="login-emblem" />
    <h1>Create Account with CAC</h1>
    <p class="subtitle">CAC verification is required for account creation.</p>
    {% if error %}
      <div class="alert alert-danger py-1">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('auth.account_create_cac') }}">
      {% if next_url %}
        <input type="hidden" name="next" value="{{ next_url }}" />
      {% endif %}
      <div class="mb-3">
        <label class="form-label">First Name</label>
        <input type="text" name="first_name" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Last Name</label>
        <input type="text" name="last_name" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Officer Number</label>
        <input type="text" name="officer_number" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button class="btn btn-primary w-100">Create Account</button>
    </form>
    <a class="btn btn-outline-secondary w-100 mt-2" href="{{ url_for('auth.landing') }}">Back to Login</a>
  </div>
</div>
{% endblock %}
