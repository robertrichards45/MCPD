{% extends 'base.html' %}
{% block body %}
<style>
  .mobile-home-screen {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom)) 16px;
    background:
      radial-gradient(circle at 12% 10%, rgba(214, 170, 83, 0.36), transparent 28%),
      radial-gradient(circle at 90% 24%, rgba(72, 109, 89, 0.32), transparent 30%),
      linear-gradient(155deg, #071012 0%, #12221c 48%, #312813 100%) !important;
    color: #f8f2e7 !important;
    overflow: hidden;
    position: relative;
  }
  .mobile-home-screen::before {
    content: "";
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(230, 207, 154, 0.18);
    border-radius: 28px;
    pointer-events: none;
  }
  .mobile-home-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .mobile-home-header h1 {
    margin: 0;
    color: #fff8e9 !important;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .mobile-home-menu {
    min-height: 42px;
    padding: 0 14px;
    border: 1px solid rgba(230, 207, 154, 0.28);
    border-radius: 999px;
    background: rgba(255,255,255,0.09) !important;
    color: #f8f2e7 !important;
    backdrop-filter: blur(14px);
  }
  .mobile-home-main {
    flex: 1;
    display: grid;
    align-content: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .mobile-home-prompt {
    margin: 0;
    max-width: 320px;
    font-size: clamp(32px, 11vw, 44px);
    line-height: 1.05;
    color: #fff8e9 !important;
    letter-spacing: -0.04em;
  }
  .mobile-home-actions {
    display: grid;
    gap: 12px;
  }
  .mobile-home-action {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 66px;
    padding: 0 20px;
    border-radius: 20px;
    border: 1px solid rgba(230, 207, 154, 0.18);
    background: rgba(255,255,255,0.10) !important;
    color: #f8f2e7 !important;
    backdrop-filter: blur(18px);
    text-decoration: none;
    font-size: 17px;
    font-weight: 800;
    text-align: center;
    box-shadow: 0 16px 36px rgba(0,0,0,0.20);
  }
  .mobile-home-action.is-primary {
    min-height: 82px;
    background: linear-gradient(135deg, #f1c66c 0%, #d98f31 100%) !important;
    color: #111711 !important;
    border-color: rgba(255, 233, 177, 0.85);
    font-size: 19px;
  }
</style>
<div class="mobile-home-screen">
  <header class="mobile-home-header">
    <h1>MCPD Portal</h1>
    <button class="mobile-home-menu" type="button" aria-label="Menu">Menu</button>
  </header>

  <main class="mobile-home-main" aria-label="Field home">
    <h2 class="mobile-home-prompt">Ready to start a call?</h2>
    <div class="mobile-home-actions">
      {% for card in action_cards %}
        {% if card.is_live %}
        <a class="mobile-home-action {% if loop.first %}is-primary{% endif %}" href="{{ card.href }}">{{ card.title }}</a>
        {% else %}
        <span class="mobile-home-action is-disabled {% if loop.first %}is-primary{% endif %}">{{ card.title }}</span>
        {% endif %}
      {% endfor %}
    </div>
  </main>
</div>
{% endblock %}
