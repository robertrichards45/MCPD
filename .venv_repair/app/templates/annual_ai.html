{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head">
      <h2 class="mb-1">Annual Training Assistance</h2>
      <p class="text-muted mb-0">Ask training questions and get concise guidance.</p>
    </div>
    <div class="card p-3">
      <form method="post" action="{{ url_for('annual_ai.ask') }}">
        <label class="form-label text-dark">Paste your question</label>
        <textarea name="question" class="form-control" rows="6">{{ question or '' }}</textarea>
        <button class="btn btn-primary mt-2">Ask</button>
      </form>
      {% if answer %}
        <div class="ai-answer">
          <h5>Answer</h5>
          <p>{{ answer }}</p>
          <div class="ai-disclaimer">For training assistance only; follow official SOP and supervisor guidance.</div>
        </div>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
