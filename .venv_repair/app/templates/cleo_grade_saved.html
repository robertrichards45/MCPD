{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-4">
      <h2 class="mb-2">Mock Report Review Saved</h2>
      <p class="text-muted">
        Report {{ report.title or ('#' ~ report.id) }} is now marked as <strong>{{ disposition }}</strong>.
      </p>
      <div class="d-flex gap-2">
        <a class="btn btn-primary" href="{{ url_for('cleo_api.cleo_report_view', report_id=report.id) }}">Return to Report</a>
        <a class="btn btn-outline-secondary" href="{{ url_for('reports.list_reports') }}">Back to Reports Center</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
