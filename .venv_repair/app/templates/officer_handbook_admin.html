{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head">
      <h2 class="mb-1">Officer Handbook Admin</h2>
      <p class="text-muted mb-0">Update supplemental handbook additions only. The original uploaded New Officer Handbook PDF is locked as the foundation source.</p>
    </div>
    <form method="post" class="card p-3">
      <label class="form-label text-dark">Supplemental Additions JSON</label>
      <textarea class="form-control" name="handbook_json" rows="28">{{ handbook_json }}</textarea>
      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary">Save Additions</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('reference.officer_handbook') }}">Back to Handbook</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
