{% extends 'base.html' %}
{% block body %}
<div class="app-shell">
  {% include 'partials/nav.html' %}
  <div class="page-wrap">
    <div class="card p-3 mb-3 page-head">
      <h2 class="mb-1">Upload Stats Excel</h2>
      <p class="text-muted mb-0">Import monthly statistics workbook.</p>
    </div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <div class="card p-3">
      <form method="post" enctype="multipart/form-data">
        <div class="mb-3"><label class="form-label text-dark">Excel File (.xlsx)</label><input type="file" class="form-control" name="file" required /></div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary">Upload</button>
          <a class="btn btn-outline-secondary" href="{{ url_for('admin.stats_uploads') }}">History</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
